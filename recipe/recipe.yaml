# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.32.0"

package:
  name: chalice
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/c/chalice/chalice-${{ version }}.tar.gz
    sha256: c1d469316747ef8850b4b286c60bcf8c53da3bab1a2042d7551284aa8be06af2
    target_directory: dist
  - url: https://github.com/aws/chalice/archive/refs/tags/1.32.0.tar.gz
    sha256: f4d86905b01c1e9e4855e8e38ff167210a2057a78688fa50a58cbdc68f0a9229
    target_directory: src

build:
  number: 0
  noarch: python
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - botocore >=1.14.0,<2.0.0
    - click >=7,<9.0
    - inquirer >=3.0.0,<4.0.0
    - jmespath >=0.9.3,<2.0.0
    - pip >=9,<25.1
    - python >=${{ python_min }}
    - pyyaml >=5.3.1,<7.0.0
    - setuptools
    - six >=1.10.0,<2.0.0
    - wheel
  run_constraints:
    - watchdog ==2.3.1

tests:
  - python:
      imports: chalice
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - src/tests
    requirements:
      run:
        - pytest-cov
    script:
      - chalice --help
      - coverage run --source=chalice --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=100

about:
  license: Apache-2.0
  license_file:
    - dist/LICENSE
    - dist/NOTICE
  summary: Chalice is a microframework for writing serverless apps in python.
  description: |
    Chalice is a microframework for writing serverless apps in python. It allows you to quickly create and deploy applications that use AWS Lambda. It provides:
    - A command line tool for creating, deploying, and managing your app
    - A decorator based API for integrating with Amazon API Gateway, Amazon S3, Amazon SNS, Amazon SQS, and other AWS services.
    - Automatic IAM policy generation
  homepage: https://pypi.org/project/chalice
  repository: https://github.com/aws/chalice
  documentation: https://chalice.readthedocs.io

extra:
  recipe-maintainers:
    - sodre
    - markllama
    - dgasmith
